name: Terraform Quality & Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint --chdir=infra

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          soft_fail: true

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Plan (JSON)
        run: terraform -chdir=infra plan -out=tfplan && terraform -chdir=infra show -json tfplan > infra/terraform.json

      - name: Run OPA
        run: opa eval --data policies/ --input infra/terraform.json "data.terraform.security.deny"
